<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Hippie VW Camper Van on the road">
  <rect width="64" height="64" rx="14" fill="#163B5C"/>

  <clipPath id="tile">
    <rect width="64" height="64" rx="14"/>
  </clipPath>

  <g clip-path="url(#tile)">
    <!-- ===== Retro sun disc, upper-right sky ===== -->
    <clipPath id="sun">
      <circle cx="46" cy="16" r="10"/>
    </clipPath>
    <g clip-path="url(#sun)">
      <rect x="36" y="6" width="20" height="20" fill="#FF7A3C"/>
      <rect x="36" y="13.5" width="20" height="1.7" fill="#163B5C"/>
      <rect x="36" y="17.3" width="20" height="1.7" fill="#163B5C"/>
      <rect x="36" y="21.1" width="20" height="1.7" fill="#163B5C"/>
    </g>

    <!-- ===== Road ===== -->
    <rect x="0" y="52" width="64" height="12" fill="#2A2A35"/>
    <rect x="5"  y="57" width="7" height="2.2" rx="1.1" fill="#FFD23F"/>
    <rect x="18" y="57" width="7" height="2.2" rx="1.1" fill="#FFD23F"/>
    <rect x="31" y="57" width="7" height="2.2" rx="1.1" fill="#FFD23F"/>
    <rect x="44" y="57" width="7" height="2.2" rx="1.1" fill="#FFD23F"/>
    <rect x="57" y="57" width="7" height="2.2" rx="1.1" fill="#FFD23F"/>

    <!-- ===== VW Camper Van, side profile (smaller, lower) ===== -->
    <path d="M9 52 L9 36 Q9 28 17 28 L43 28 Q49 28 51.5 34 L53 42 L53 52 Z" fill="#F4F1E8"/>

    <!-- Two-tone hippie paint -->
    <path d="M9 52 L9 44 Q31 41 53 44 L53 52 Z" fill="#FF7A3C"/>
    <path d="M9 44 Q31 41 53 44 L53 46.2 Q31 43.2 9 46.2 Z" fill="#3AAFA9"/>

    <!-- Windows: tops follow roof curve -->
    <path d="M13 38 L13 36 Q13 31.5 17.5 31.5 L28 31.5 L28 38 Z" fill="#9FD8E6"/>
    <rect x="30" y="31.5" width="8.5" height="6.5" rx="1.2" fill="#9FD8E6"/>
    <path d="M40.5 38 L40.5 31.5 Q47 31.5 49 38 Z" fill="#9FD8E6"/>

    <!-- Peace sign (centered on lower body) -->
    <g transform="translate(31 46.5)">
      <circle r="5" fill="#163B5C"/>
      <circle r="5" fill="none" stroke="#FFD23F" stroke-width="1.6"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#FFD23F" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="-3.5" y2="3.5" stroke="#FFD23F" stroke-width="1.6"/>
      <line x1="0" y1="0" x2="3.5" y2="3.5" stroke="#FFD23F" stroke-width="1.6"/>
    </g>

    <!-- Wheels -->
    <circle cx="18" cy="52" r="5.5" fill="#2A2A35"/>
    <circle cx="18" cy="52" r="2.4" fill="#C9C4B4"/>
    <circle cx="44" cy="52" r="5.5" fill="#2A2A35"/>
    <circle cx="44" cy="52" r="2.4" fill="#C9C4B4"/>
  </g>
</svg>
